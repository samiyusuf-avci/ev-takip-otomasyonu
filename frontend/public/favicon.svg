<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e153b" />
      <stop offset="50%" stop-color="#120e26" />
      <stop offset="100%" stop-color="#0a0817" />
    </linearGradient>

    <!-- Border Glow Rim -->
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.7" />
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.7" />
    </linearGradient>

    <!-- House Gradient -->
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe" />
      <stop offset="40%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Inner Core Spark Gradient -->
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>

    <!-- Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="ambientGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>

  <!-- Squircle Base (Full Bleed for Maskable Icons) -->
  <rect width="512" height="512" rx="115" fill="url(#bgGrad)" />
  
  <!-- Outer Glow Border Rim -->
  <rect x="3" y="3" width="506" height="506" rx="113" fill="none" stroke="url(#rimGrad)" stroke-width="4" opacity="0.8" />

  <!-- Ambient Light Orbs behind Logo -->
  <circle cx="256" cy="240" r="140" fill="#a855f7" opacity="0.3" filter="url(#ambientGlow)" />
  <circle cx="256" cy="280" r="90" fill="#38bdf8" opacity="0.25" filter="url(#ambientGlow)" />

  <!-- Main Smart House Emblem -->
  <g filter="url(#glow)">
    <!-- Stylized Modern House Structure -->
    <path d="M 256 125 
             L 370 215 
             A 12 12 0 0 1 365 236 
             L 345 236 
             L 345 345 
             A 22 22 0 0 1 323 367 
             L 189 367 
             A 22 22 0 0 1 167 345 
             L 167 236 
             L 147 236 
             A 12 12 0 0 1 142 215 
             Z" 
          fill="url(#houseGrad)" />

    <!-- Dark Inner Architectural Window Cutout -->
    <path d="M 256 178 
             L 318 227 
             L 302 227 
             L 302 328 
             L 210 328 
             L 210 227 
             L 194 227 
             Z" 
          fill="#0c0a1a" />

    <!-- Vibrant Energy Heartbeat / Spark Core -->
    <path d="M 265 205 
             L 226 272 
             L 255 272 
             L 243 325 
             L 288 258 
             L 259 258 
             Z" 
          fill="url(#sparkGrad)" />
  </g>
</svg>